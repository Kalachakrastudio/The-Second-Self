<div class="page-toolbar">


<div class="toolbar-left">


<input
type="text"
id="participantSearch"
placeholder="Search Participant..."
>


<select id="participantCategoryFilter">

<option value="all">
All Categories
</option>

</select>


</div>


</div>



<div class="table-card">


<table class="event-table">


<thead>


<tr>

<th>Name</th>

<th>Category</th>

<th>City</th>

<th>Status</th>

<th>Actions</th>


</tr>


</thead>



<tbody id="participantTable">


<tr>

<td colspan="6" class="empty-row">

<i class="fa-solid fa-users"></i>

<p>No Participants Found</p>

<small>
New performer registrations will appear here.
</small>


</td>

</tr>


</tbody>


</table>


</div>





<!-- PARTICIPANT MODAL -->


<div
id="participantModal"
class="modal">


<div class="modal-box">


<div class="modal-header">


<h2>
Participant Details
</h2>


<button id="closeParticipantModal">

<i class="fa-solid fa-xmark"></i>

</button>


</div>



<div id="participantDetails">


</div>



<div class="modal-footer">


<button
class="cancel-btn"
id="rejectParticipant">

Reject

</button>



<button
class="primary-btn"
id="selectParticipant">

Select

</button>


</div>


</div>


</div>
<!-- ASSIGN EVENT MODAL -->

<div id="assignEventModal" class="modal">

    <div class="modal-box">

        <div class="modal-header">

            <h2>Assign Event</h2>

            <button id="closeAssignModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <label>Select Event</label>

        <select id="assignEventSelect">

            <option value="">Select Event</option>

        </select>

        <div class="modal-footer">

            <button
                class="cancel-btn"
                id="cancelAssign">

                Cancel

            </button>

            <button
                class="primary-btn"
                id="confirmAssign">

                Confirm Selection

            </button>

        </div>

    </div>

</div>
