<section class="scanner-page">

    <!-- ==========================
    Event Selection
    =========================== -->

    <div class="scanner-card">

        <div class="card-header">

            <h3>

                <i class="fa-solid fa-calendar-days"></i>

                Today's Event

            </h3>

        </div>

        <div class="custom-select">

            <select id="scannerEvent">

                <option value="">Loading Events...</option>

            </select>

        </div>

    </div>

    <!-- ==========================
    Statistics
    =========================== -->

    <div class="scanner-stats">

        <div class="stat-card">

            <i class="fa-solid fa-ticket"></i>

            <div>

                <h4>Total Tickets</h4>

                <span id="statTotal">0</span>

            </div>

        </div>

        <div class="stat-card">

            <i class="fa-solid fa-circle-check"></i>

            <div>

                <h4>Checked In</h4>

                <span id="statChecked">0</span>

            </div>

        </div>

        <div class="stat-card">

            <i class="fa-solid fa-user-clock"></i>

            <div>

                <h4>Pending</h4>

                <span id="statPending">0</span>

            </div>

        </div>

        <div class="stat-card">

            <i class="fa-solid fa-indian-rupee-sign"></i>

            <div>

                <h4>Revenue</h4>

                <span id="statRevenue">₹0</span>

            </div>

        </div>

    </div>

    <!-- ==========================
    Scanner & Search
    =========================== -->

    <div class="scanner-grid">

        <!-- Camera -->

        <div class="scanner-card">

            <div class="card-header">

                <h3>

                    <i class="fa-solid fa-qrcode"></i>

                    QR Scanner

                </h3>

            </div>

            <div id="reader"></div>

        </div>

        <!-- Search -->

        <div class="scanner-card">

            <div class="card-header">

                <h3>

                    <i class="fa-solid fa-magnifying-glass"></i>

                    Search Ticket

                </h3>

            </div>

            <div class="search-box">

                <input
                    id="scannerSearch"
                    type="text"
                    placeholder="Ticket ID or Mobile Number">

                <button id="scannerSearchBtn">

                    <i class="fa-solid fa-search"></i>

                    Search

                </button>

            </div>

            <div
                id="scannerTicket"
                class="ticket-card"
                style="display:none;">

            </div>

        </div>

    </div>

    <!-- ==========================
    Recent Check-ins
    =========================== -->

    <div class="scanner-card">

        <div class="card-header">

            <h3>

                <i class="fa-solid fa-clock-rotate-left"></i>

                Recent Check-ins

            </h3>

        </div>

        <div class="table-wrapper">

            <table class="checkin-table">

                <thead>

                    <tr>

                        <th>Time</th>

                        <th>Ticket ID</th>

                        <th>Name</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="recentCheckins">

                    <tr>

                        <td colspan="4" class="empty-row">

                            No Check-ins Yet

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</section>

<!-- ==========================
Loader
========================== -->

<div id="scannerLoader" class="loader">

    <div class="loader-box">

        <div class="spinner"></div>

        <h3>Checking Ticket...</h3>

        <p>Please wait...</p>

    </div>

</div>

<!-- ==========================
Popup
========================== -->

<div id="scannerPopup" class="result-popup">

    <div class="popup-card">

        <div id="popupIcon"></div>

        <h2 id="popupTitle"></h2>

        <p id="popupMessage"></p>

    </div>

</div>
