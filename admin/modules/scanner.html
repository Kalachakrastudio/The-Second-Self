<section class="scanner-page">

    <!-- =========================================
    EVENT SELECTOR
    ========================================== -->

    <div class="scanner-card">

        <div class="card-header">

            <h3>
                <i class="fa-solid fa-calendar-days"></i>
                Select Event
            </h3>

        </div>

        <div class="scanner-event">

            <select id="scannerEvent">

                <option>
                    Loading Events...
                </option>

            </select>

        </div>

    </div>


    <!-- =========================================
    STATISTICS
    ========================================== -->

    <div class="scanner-stats">

        <div class="scanner-stat">

            <i class="fa-solid fa-ticket"></i>
            <div>
            <h2 id="statTotal">0</h2>

            <p>Total Tickets</p>
            </div>
        </div>


        <div class="scanner-stat">

            <i class="fa-solid fa-circle-check"></i>
            <div>
            <h2 id="statChecked">0</h2>

            <p>Checked In</p>
            </div>
        </div>


        <div class="scanner-stat">

            <i class="fa-solid fa-user-clock"></i>
            <div>
            <h2 id="statPending">0</h2>

            <p>Pending</p>
            </div>
        </div>


        <div class="scanner-stat">

            <i class="fa-solid fa-indian-rupee-sign"></i>
            <div>
            <h2 id="statRevenue">₹0</h2>

            <p>Revenue</p>
            </div>
        </div>

    </div>



    <!-- =========================================
    MAIN GRID
    ========================================== -->

    <div class="scanner-grid">


        <!-- ==========================
        CAMERA
        =========================== -->

        <div class="scanner-card">

            <div class="card-header">

                <h3>

                    <i class="fa-solid fa-qrcode"></i>

                    QR Scanner

                </h3>

            </div>

            <div id="reader"></div>

        </div>



        <!-- ==========================
        SEARCH
        =========================== -->

        <div class="scanner-card">

            <div class="card-header">

                <h3>

                    <i class="fa-solid fa-magnifying-glass"></i>

                    Search Ticket

                </h3>

            </div>


            <div class="scanner-search">

                <input

                    id="scannerSearch"

                    type="text"

                    placeholder="Enter Ticket ID or Mobile Number"

                >

                <button id="scannerSearchBtn">

                    <i class="fa-solid fa-search"></i>

                    Search

                </button>

            </div>


            <!-- Ticket Result -->

            <div
                id="scannerTicket"
                class="scanner-ticket"
                style="display:none;">

            </div>

        </div>

    </div>



    <!-- =========================================
    RECENT CHECKINS
    ========================================== -->

    <div class="scanner-card">

        <div class="card-header">

            <h3>

                <i class="fa-solid fa-clock-rotate-left"></i>

                Recent Check-Ins

            </h3>

        </div>


        <div class="scanner-table">

            <table>

                <thead>

                    <tr>

                        <th>Time</th>

                        <th>Ticket ID</th>

                        <th>Name</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="recentCheckins">

                    <tr>

                        <td colspan="4" class="empty-row">

                            No Check-Ins Yet

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</section>



<!-- =========================================
LOADER
========================================= -->

<div
    id="scannerLoader"
    class="scanner-loader">

    <div class="scanner-loader-box">

        <div class="scanner-spinner"></div>

       <h3 id="loaderTitle">
Loading Events...
</h3>

<p id="loaderText">
Please wait
</p>

    </div>

</div>



<!-- =========================================
POPUP
========================================= -->

<div id="scannerPopup" class="scannerPopup">


    <div class="popup-card">


        <div id="popupIcon"></div>


        <h3 id="popupTitle"></h3>


        <p id="popupMessage"></p>


    </div>


</div>

    <div id="scannerLoader">
    Loading...
</div>
