<div class="page-toolbar">

    <div class="toolbar-left">

        <input
            type="text"
            id="eventSearch"
            placeholder="Search Event...">

        <select id="eventStatus">

            <option value="all">All Status</option>
            <option value="Upcoming">Upcoming</option>
            <option value="Live">Live</option>
            <option value="Completed">Completed</option>

        </select>

    </div>

    <button
        class="primary-btn"
        id="addEventBtn">

        <i class="fa-solid fa-plus"></i>

        Add Event

    </button>

</div>


<div class="table-card">

<table>

<thead>

<tr>

<th>Event</th>

<th>Date</th>

<th>Venue</th>

<th>Status</th>

<th>Tickets</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="eventTable">

<tr>

<td colspan="6" class="empty-row">

No Events Found

</td>

</tr>

</tbody>

</table>

</div>


<!-- ==========================
ADD EVENT MODAL
========================== -->

<div
id="eventModal"
class="modal">

<div class="modal-box">

<div class="modal-header">

<h2>

Create Event

</h2>

<button
id="closeModal">

<i class="fa-solid fa-xmark"></i>

</button>

</div>


<form id="eventForm">

<div class="grid-2">

<div>

<label>

Event Name

</label>

<input
type="text"
id="eventName"
required>

</div>

<div>

<label>

Event Date

</label>

<input
type="date"
id="eventDate"
required>

</div>

<div>

<label>

Event Time

</label>

<input
type="time"
id="eventTime"
required>

</div>

<div>

<label>

Venue

</label>

<input
type="text"
id="eventVenue"
required>

</div>

<div>

<label>

City

</label>

<input
type="text"
id="eventCity"
required>

</div>

<div>

<label>

Status

</label>

<select id="eventStatusSelect">

<option>Upcoming</option>

<option>Live</option>

<option>Completed</option>

</select>

</div>

</div>

<hr>

<h3>

Ticket Categories

</h3>

<div id="ticketContainer">

</div>

<button
type="button"
id="addTicketRow"
class="secondary-btn">

<i class="fa-solid fa-plus"></i>

Add Ticket

</button>

<div class="modal-footer">

<button
type="button"
id="cancelEvent"
class="cancel-btn">

Cancel

</button>

<button
type="submit"
class="primary-btn">

Save Event

</button>

</div>

</form>

</div>

</div>
