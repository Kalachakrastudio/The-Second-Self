<div class="page-header">

    <div>

        <h2>Events</h2>

        <p>Manage all events, ticket categories and limits.</p>

    </div>

    <button id="addEventBtn" class="primary-btn">

        <i class="fa-solid fa-plus"></i>

        Add Event

    </button>

</div>

<div class="table-card">

    <table class="event-table">

        <thead>

            <tr>

                <th>Event</th>

                <th>Date</th>

                <th>Venue</th>

                <th>Status</th>

                <th>Tickets</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="eventTableBody">

        </tbody>

    </table>

</div>

<!-- Add Event Modal -->

<div class="modal" id="eventModal">

    <div class="modal-content">

        <div class="modal-header">

            <h3>Create Event</h3>

            <button id="closeModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <form id="eventForm">

            <div class="form-grid">

                <div>

                    <label>Event Name</label>

                    <input
                    type="text"
                    id="eventName"
                    required>

                </div>

                <div>

                    <label>Date</label>

                    <input
                    type="date"
                    id="eventDate"
                    required>

                </div>

                <div>

                    <label>Venue</label>

                    <input
                    type="text"
                    id="eventVenue"
                    required>

                </div>

                <div>

                    <label>Status</label>

                    <select id="eventStatus">

                        <option>Upcoming</option>

                        <option>Live</option>

                        <option>Completed</option>

                    </select>

                </div>

            </div>

            <button
            class="primary-btn"
            type="submit">

                Save Event

            </button>

        </form>

    </div>

</div>
